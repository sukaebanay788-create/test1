<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Криптовалютный Скринер</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" href="assets/favicon.ico">
</head>
<body>
    <div class="container">
        <header>
            <h1>🚀 Crypto Screener</h1>
            <p>Отслеживание криптовалют в реальном времени</p>
        </header>

        <main>
            <!-- Список монет -->
            <section id="coin-list">
                <h2>Топ-10 монет</h2>
                <div id="coins-container"></div>
            </section>

            <!-- График цены с выбором интервала -->
            <section id="chart-container">
                <h2>График цены</h2>
                <div class="chart-controls">
                    <select id="coin-selector">
                        <option value="bitcoin">Bitcoin</option>
                        <option value="ethereum">Ethereum</option>
                        <option value="binancecoin">BNB</option>
                        <option value="solana">Solana</option>
                        <option value="cardano">Cardano</option>
                    </select>
                    <select id="interval-selector">
                        <option value="24">24 часа</option>
                        <option value="7" selected>7 дней</option>
                        <option value="30">30 дней</option>
                        <option value="365">1 год</option>
                        <option value="max">Весь период</option>
                    </select>
                </div>
                <div id="chart-canvas">
                    <canvas id="price-chart"></canvas>
                </div>
            </section>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="script.js"></script>
</body>
</html>
